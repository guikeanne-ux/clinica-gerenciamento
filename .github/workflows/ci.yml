name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  backend-quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: xdebug

      - name: Install dependencies
        run: composer install --working-dir=backend --no-interaction --prefer-dist

      - name: Lint (PHPCS)
        run: composer --working-dir=backend lint

      - name: Static analysis (PHPStan)
        run: composer --working-dir=backend phpstan

      - name: Tests (PEST)
        run: composer --working-dir=backend test
