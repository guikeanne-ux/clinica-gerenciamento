<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="ClinicaGest — Sistema de gestão clínica multiprofissional" />
  <title>ClinicaGest</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <!-- Design System -->
  <link rel="stylesheet" href="/frontend/core/css/tokens.css" />
  <link rel="stylesheet" href="/frontend/core/css/reset.css" />
  <link rel="stylesheet" href="/frontend/core/css/base.css" />
  <link rel="stylesheet" href="/frontend/core/css/layout.css" />
  <link rel="stylesheet" href="/frontend/core/css/components.css" />
  <link rel="stylesheet" href="/frontend/core/css/utilities.css" />
  <link rel="stylesheet" href="/frontend/core/css/theme.css" />
  <link rel="stylesheet" href="/frontend/modules/schedule/schedule.css" />

  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@0.468.0/dist/umd/lucide.min.js"></script>

  <style>
    #app-loading {
      position: fixed; inset: 0;
      background: linear-gradient(135deg, #0d3330 0%, #157470 100%);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 999; gap: 1.25rem;
      transition: opacity 0.3s ease;
    }
    #app-loading.hidden { opacity: 0; pointer-events: none; }
    #app-loading .mark {
      width: 56px; height: 56px;
      background: rgba(255,255,255,0.12);
      border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.4rem; font-weight: 800; color: #fff;
    }
    #app-loading .spinner {
      width: 32px; height: 32px;
      border: 3px solid rgba(255,255,255,0.2);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="app-loading">
    <div class="mark">C</div>
    <div class="spinner"></div>
  </div>

  <div id="app"></div>

  <div id="toast-root"></div>

  <script type="module">
    import '/frontend/core/js/app.js';
    /* Hide loading once modules start resolving */
    setTimeout(() => {
      const l = document.getElementById('app-loading');
      if (l) l.classList.add('hidden');
      setTimeout(() => l?.remove(), 350);
    }, 400);
  </script>
</body>
</html>
