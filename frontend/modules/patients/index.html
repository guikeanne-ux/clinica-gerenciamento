<!doctype html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Pacientes</title><link rel="stylesheet" href="../../core/css/tokens.css"><link rel="stylesheet" href="../../core/css/reset.css"><link rel="stylesheet" href="../../core/css/base.css"><link rel="stylesheet" href="../../core/css/layout.css"><link rel="stylesheet" href="../../core/css/components.css"></head><body><main class="main-content"><section class="section"><h1>Pacientes</h1><div class="filters"><input id="search" class="input" placeholder="Buscar nome/CPF/e-mail/telefone"><select id="status" class="input"><option value="">Todos</option><option value="active">Ativo</option><option value="inactive">Inativo</option></select><button id="btn-search" class="btn btn-md">Buscar</button><button id="btn-new" class="btn btn-md">Novo</button></div><div id="list" class="cards-grid" style="margin-top:1rem"></div><div class="pagination" id="pager"></div></section><section class="section"><h2>Paciente (criar/editar)</h2><form id="patient-form" class="filters"><input type="hidden" name="uuid"><div class="field"><label>Nome completo</label><input class="input" name="full_name" required></div><div class="field"><label>Data de nascimento</label><input class="input" name="birth_date" placeholder="AAAA-MM-DD" required></div><div class="field"><label>CPF</label><input class="input" name="cpf" data-mask="cpf"></div><div class="field"><label>E-mail</label><input class="input" name="email" type="email"></div><div class="field"><label>Telefone</label><input class="input" name="phone_primary" data-mask="phone"></div><div class="field"><label>Status</label><select class="input" name="status"><option value="active">Ativo</option><option value="inactive">Inativo</option></select></div></form><div class="row-wrap" style="margin-top:.8rem"><button id="btn-save" class="btn btn-md">Salvar</button></div><div class="tabs" data-tabs style="margin-top:1rem"><button class="tab active" data-target="#tab-info">Informações gerais</button><button class="tab" data-target="#tab-resp">Responsáveis</button><button class="tab" data-target="#tab-time">Linha do tempo</button><button class="tab" data-target="#tab-pront">Prontuário</button><button class="tab" data-target="#tab-files">Arquivos</button></div><div id="tab-info" class="tab-panel active"><p class="subtitle">Dados gerais do paciente.</p></div><div id="tab-resp" class="tab-panel"><div id="responsibles"></div></div><div id="tab-time" class="tab-panel"><div class="empty-state card">Placeholder de timeline (entrega futura).</div></div><div id="tab-pront" class="tab-panel"><div class="empty-state card">Placeholder de prontuário (entrega futura).</div></div><div id="tab-files" class="tab-panel"><div class="empty-state card">Placeholder de arquivos (entrega futura).</div></div><div id="feedback" style="margin-top:.8rem"></div></section></main><script type="module" src="./patients.js"></script></body></html>
