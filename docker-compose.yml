services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: clinica_app
    working_dir: /var/www
    volumes:
      - ./:/var/www
    ports:
      - "${APP_PORT:-8080}:8080"
    environment:
      XDEBUG_MODE: coverage
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mariadb:11.4
    container_name: clinica_db
    environment:
      MARIADB_ROOT_PASSWORD: root
      MARIADB_DATABASE: ${DB_DATABASE:-clinica}
      MARIADB_USER: ${DB_USERNAME:-clinica}
      MARIADB_PASSWORD: ${DB_PASSWORD:-clinica}
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h 127.0.0.1 -uroot -proot --silent"]
      interval: 3s
      timeout: 3s
      retries: 20
      start_period: 5s

  phpmyadmin:
    image: phpmyadmin:5.2
    container_name: clinica_phpmyadmin
    depends_on:
      db:
        condition: service_healthy
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
    ports:
      - "${PHPMYADMIN_PORT:-8081}:80"

volumes:
  db_data:
